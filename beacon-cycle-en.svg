<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title id="title">Beacon Cycle</title>
  <desc id="desc">A cycle that links guiding principles to responsible action and verifiable review.</desc>
  <rect width="1448" height="1086" fill="#ffffff"/>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#07245a"/></marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#007d82"/></marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#07245a" flood-opacity=".10"/></filter>
  </defs>
  <text x="724" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#061a4b">Beacon Cycle</text>
  <text x="724" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#061a4b">A cycle that links guiding principles to responsible action and verifiable review</text>
  <text x="724" y="128" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="19" font-weight="700" fill="#061a4b">守るべき原則を、責任ある実行と検証可能な見直しにつなぐ循環</text>
  <circle cx="724" cy="560" r="205" fill="#f3f7fd" stroke="#b8c8e4" stroke-width="1.5" stroke-dasharray="2 4"/>
  <circle cx="724" cy="560" r="162" fill="#07245a" filter="url(#soft)"/>
  <text x="724" y="495" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#ffffff">Beacon</text>
  <text x="724" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Guiding purpose, principles,</text>
  <text x="724" y="563" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">and boundaries that must</text>
  <text x="724" y="593" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">not be crossed</text>
  <text x="724" y="631" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="19" font-weight="700" fill="#ffffff">守るべき目的・原則・</text>
  <text x="724" y="658" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="19" font-weight="700" fill="#ffffff">越えてはならない境界</text>
  <path d="M650 145 C430 175 295 305 290 455" fill="none" stroke="#07245a" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <path d="M845 192 C1040 250 1130 410 1076 587" fill="none" stroke="#007d82" stroke-width="6" marker-end="url(#arrow-teal)"/>
  <path d="M1038 650 C970 810 845 890 693 878" fill="none" stroke="#007d82" stroke-width="6" marker-end="url(#arrow-teal)"/>
  <path d="M610 879 C433 860 300 740 280 590" fill="none" stroke="#07245a" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <path d="M240 530 C240 390 350 265 502 205" fill="none" stroke="#07245a" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <path d="M1004 388 C1135 350 1214 300 1214 285" fill="none" stroke="#007d82" stroke-width="5" marker-end="url(#arrow-teal)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(548 145)"><circle cx="176" cy="0" r="18" fill="#07245a"/><text x="176" y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">1</text><circle cx="176" cy="118" r="110" fill="#fff" stroke="#07245a" stroke-width="3"/><text x="176" y="105" text-anchor="middle" font-size="22" font-weight="800" fill="#07245a">Responsibility Design</text><text x="176" y="132" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#07245a">責任設計</text><line x1="76" y1="148" x2="276" y2="148" stroke="#07245a"/><text x="176" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Translate the Beacon into operating</text><text x="176" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">conditions, evidence requirements,</text><text x="176" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">responsibility boundaries, and approvals.</text></g>
    <g transform="translate(865 330)"><circle cx="110" cy="-22" r="18" fill="#007d82"/><text x="110" y="-15" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">2</text><circle cx="110" cy="100" r="120" fill="#fff" stroke="#007d82" stroke-width="3"/><text x="110" y="90" text-anchor="middle" font-size="21" font-weight="800" fill="#007d82">Pre-Execution Assurance</text><text x="110" y="119" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#007d82">実行前保証</text><line x1="20" y1="145" x2="200" y2="145" stroke="#007d82"/><text x="110" y="169" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Evaluate evidence, authority,</text><text x="110" y="189" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">approvals, policy version,</text><text x="110" y="209" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">pre-state, and expected effect.</text></g>
    <g transform="translate(1244 250)"><rect x="-10" y="-10" width="185" height="86" rx="8" fill="#f6fffb" stroke="#007d82" stroke-width="2"/><text x="82" y="18" text-anchor="middle" font-size="18" font-weight="800" fill="#007d82">AUTHORIZED</text><text x="82" y="43" text-anchor="middle" font-size="15" font-weight="700" fill="#007d82">Execution authority</text><text x="82" y="63" text-anchor="middle" font-size="15" font-weight="700" fill="#007d82">established</text></g>
    <g transform="translate(1244 375)"><rect x="-10" y="-10" width="185" height="88" rx="8" fill="#fff8ec" stroke="#b87500" stroke-width="2"/><text x="82" y="18" text-anchor="middle" font-size="18" font-weight="800" fill="#b87500">REQUIRES_REVIEW</text><text x="82" y="43" text-anchor="middle" font-size="15" font-weight="700" fill="#b87500">Designated review</text><text x="82" y="63" text-anchor="middle" font-size="15" font-weight="700" fill="#b87500">required</text></g>
    <g transform="translate(1244 505)"><rect x="-10" y="-10" width="185" height="88" rx="8" fill="#fff4f4" stroke="#c01818" stroke-width="2"/><text x="82" y="18" text-anchor="middle" font-size="18" font-weight="800" fill="#c01818">NOT_AUTHORIZED</text><text x="82" y="43" text-anchor="middle" font-size="15" font-weight="700" fill="#c01818">Execution authority</text><text x="82" y="63" text-anchor="middle" font-size="15" font-weight="700" fill="#c01818">not established</text></g>
    <g transform="translate(845 645)"><circle cx="115" cy="-18" r="18" fill="#007d82"/><text x="115" y="-11" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">3</text><circle cx="115" cy="100" r="118" fill="#fff" stroke="#007d82" stroke-width="3"/><text x="115" y="84" text-anchor="middle" font-size="20" font-weight="800" fill="#007d82">Transition-Authorized</text><text x="115" y="110" text-anchor="middle" font-size="20" font-weight="800" fill="#007d82">Action</text><text x="115" y="138" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="17" font-weight="700" fill="#007d82">状態遷移許可済み操作</text><line x1="30" y1="161" x2="200" y2="161" stroke="#007d82"/><text x="115" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Execute only the operation</text><text x="115" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">bound to an AUTHORIZED transition.</text></g>
    <g transform="translate(565 835)"><circle cx="150" cy="-10" r="18" fill="#007d82"/><text x="150" y="-3" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">4</text><circle cx="150" cy="90" r="104" fill="#fff" stroke="#007d82" stroke-width="3"/><text x="150" y="75" text-anchor="middle" font-size="22" font-weight="800" fill="#007d82">Verifiable Record</text><text x="150" y="102" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#007d82">証拠記録</text><line x1="62" y1="124" x2="238" y2="124" stroke="#007d82"/><text x="150" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Bind decisions, evidence, approvals,</text><text x="150" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">unverified conditions, and results.</text></g>
    <g transform="translate(115 620)"><circle cx="112" cy="-18" r="18" fill="#07245a"/><text x="112" y="-11" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">5</text><circle cx="112" cy="100" r="118" fill="#fff" stroke="#07245a" stroke-width="3"/><text x="112" y="88" text-anchor="middle" font-size="22" font-weight="800" fill="#07245a">Independent Verification</text><text x="112" y="116" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#07245a">独立検証</text><line x1="26" y1="142" x2="198" y2="142" stroke="#07245a"/><text x="112" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Confirm consistency of design,</text><text x="112" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">assurance, execution, and record</text><text x="112" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">from an independent standpoint.</text></g>
    <g transform="translate(85 300)"><circle cx="140" cy="-5" r="18" fill="#b87500"/><text x="140" y="2" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">6</text><circle cx="140" cy="110" r="118" fill="#fff" stroke="#b87500" stroke-width="3"/><text x="140" y="98" text-anchor="middle" font-size="22" font-weight="800" fill="#b87500">Review &amp; Redesign</text><text x="140" y="126" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#b87500">見直し</text><line x1="52" y1="150" x2="228" y2="150" stroke="#b87500"/><text x="140" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">Update conditions, responsibility</text><text x="140" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">boundaries, evidence requirements,</text><text x="140" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#07245a">approvals, and verification methods.</text></g>
  </g>
  <text x="724" y="397" text-anchor="middle" transform="rotate(-22 724 397)" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#07245a">Record and version accountability information throughout the cycle</text>
  <text x="724" y="1000" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800" fill="#061a4b">The Beacon Cycle continuously improves responsibility design, evidence, and verification behind decisions and actions, not merely their outcomes.</text>
  <text x="724" y="1030" text-anchor="middle" font-family="'Yu Gothic','Meiryo',Arial,sans-serif" font-size="18" font-weight="700" fill="#061a4b">結果の良し悪しだけではなく、判断と実行を支える責任設計・証拠・検証方法を継続的に改善する。</text>
</svg>
